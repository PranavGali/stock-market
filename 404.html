<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>StockIQ</title>
    <script>
      // Single Page App (SPA) redirect trick for GitHub Pages
      // When a 404 occurs, encode the path into a query string and redirect to index.html
      // segmentCount = 1 matches the depth of the repo name in the URL (/stock-market/)
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
