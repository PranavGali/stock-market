<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>StockIQ</title>
    <script>
      // GitHub Pages 404 redirect trick for Single Page Apps with React Router
      // Encodes the current path into a query param and redirects to index.html
      var segmentCount = 1; // must match the number of path segments in your repo name (1 for /stock-market/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
